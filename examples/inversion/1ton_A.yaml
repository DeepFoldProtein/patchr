# Inversion Test Example
# =======================
# This example tests the BDIA inversion algorithm:
# 1. Takes a template structure (no missing atoms)
# 2. Runs inversion: Clean Structure -> Latent Noise
# 3. Runs sampling: Latent Noise -> Reconstructed Structure
# 4. Computes RMSD between original and reconstructed
#
# The template should have NO missing atoms and match the sequence exactly.
# If successful, RMSD should be < 1.0 Å
#
# Usage: boltz predict examples/inversion/test.yaml --model boltz2_inversion_test

version: 1

sequences:
  - protein:
      id: A
      sequence: IVGGYKCEKNSQPWQVAVINEYLCGGVLIDPSWVITAAHCYSNNYQVLLGRNNLFKDEPFAQRRLVRQSFRHPDYIPLIVTNDTEQPVHDHSNDLMLLHLSEPADITGGVKVIDLPTKEPKVGSTCLASGWGSTNPSEMVVSHDLQCVNIHLLSNEKCIETYKDNVTDVMLCAGEMEGGKDTCAGDSGGPLICDGVLQGITSGGATPCAKPKTPAIYAKLIKFTSWIKKVMKENP
      msa: empty

# Template structure for inversion test
# This should be a complete structure with NO missing atoms
templates:
  - cif: examples/inversion/1ton_A_model_0.cif
    chain_id: A
